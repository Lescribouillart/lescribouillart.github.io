</head>
<body class="home-page index-page">
    <a href="#main-content" class="skip-link">Aller au contenu principal</a>
    <header class="header header--index">
        <div class="container">
            <!-- Container vide volontaire : maintient la hauteur/structure de l'en-tête
                 pour la page d'accueil afin que son fond soit visible indépendamment
                 du bandeau .intro-site-bg. -->
        </div>
    </header>
    <div class="site-header-spacer" aria-hidden="true"></div>

    <div class="home-drawer-backdrop" hidden></div>
    <aside class="home-side-panel" id="home-side-panel" aria-hidden="true" hidden>
        <div class="home-side-panel-inner">
            <div class="side-panel-rootline" aria-hidden="true">
                <img src="images/header/racines-bas-header.svg" alt="racine décorative">
            </div>
            <h2 class="home-side-panel-title">Le feuillet</h2>
            <a href="html/feuillet.html" class="home-side-panel-text">La chronologie</a>
            <a href="html2/lespersonnages.html" class="home-side-panel-text">Les personnages</a>
            <a href="html2/leslieux.html" class="home-side-panel-text">Les lieux</a>
        </div>
    </aside>

    <div class="intro-site-bg">
        <div class="intro-site-content">
            <p class="intro-site centered">
                <strong>Le Scribouill'art</strong> est en construction<span class="construction-dots" aria-hidden="true">
                    <span class="construction-dot">.</span>
                    <span class="construction-dot">.</span>
                    <span class="construction-dot">.</span>
                </span>
            </p>
            
        </div>
    </div>

    <main class="index-construction-main">
        <div
            class="index-unavailable-site-trigger"
            aria-label="Site indisponible pour le moment"
            style="position:relative;"
        >
            <video id="intro-video" autoplay muted playsinline loop>
                <source src="videos/vidaccueil.mp4" type="video/mp4">
                <img src="images/icons/construction.png" alt="Illustration chantier du site" width="262">
            </video>
            <button id="index-video-close" class="index-video-close" type="button" aria-label="Fermer la vidéo" style="position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); display:none; z-index:2;">Accéder au site</button>
        </div>

        </div>
    </footer>
    
    <!-- <script src="theme/noel/neige.js" defer></script> -->
    <script src="java-script/interface/home-drawer.js"></script>
    <script src="java-script/interface/dyslexic-mode.js"></script>
    <script src="java-script/interface/home-header-scroll.js"></script>
    <script src="java-script/interface/tagline-fireflies.js"></script>
    <script src="java-script/recherche/recherche.js"></script>
    <script src="java-script/articles/carousel.js" defer></script>
    <!-- Le code JS a été déplacé vers java-script/interface/home-drawer.js -->
        <script>
        (function(){
            'use strict';
            function initIndexVideoBehavior(){
                const video = document.getElementById('intro-video');
                const btn = document.getElementById('index-video-close');
                const container = document.querySelector('.index-unavailable-site-trigger');
                if (!video || !btn) return;

                let shownAfterFirst = false;
                let durationKnown = false;

                function showButtonAndBlur() {
                    if (shownAfterFirst) return;
                    shownAfterFirst = true;
                    video.classList.add('blurred');
                    btn.style.display = 'block';
                    btn.removeAttribute('aria-hidden');
                    try { btn.focus(); } catch(e){}
                }

                // If ended fires (reliable), use it
                video.addEventListener('ended', function(){
                    showButtonAndBlur();
                });

                // If duration is available, use timeupdate near the end (safer with loop)
                video.addEventListener('loadedmetadata', function(){
                    durationKnown = true;
                });

                video.addEventListener('timeupdate', function(){
                    if (shownAfterFirst) return;
                    const d = video.duration;
                    if (!durationKnown || !d || isNaN(d) || d === Infinity) return;
                    // If we are within the last 0.2s of the first playback, trigger
                    if (video.currentTime >= d - 0.2) {
                        showButtonAndBlur();
                    }
                });

                // Click: close the overlay and remove blur
                btn.addEventListener('click', function(){
                    try{ video.classList.remove('blurred'); } catch(e){}
                    if (container) container.style.display = 'none';
                });
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initIndexVideoBehavior);
            } else {
                initIndexVideoBehavior();
            }
        })();
        </script>
</body>
</html>
