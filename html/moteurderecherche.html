<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recherche - Le Scribouill'art</title>
    <link rel="stylesheet" href="../styles.css">
    <style>
        body {
            background-color: #e8e6e3;
        }
    </style>
</head>
<body>
    <button class="accessibility-btn" aria-label="Mode dyslexie" style="position: fixed; left: 2rem; top: 2rem; z-index: 1000;">
        <img src="../images/inclusif/dislexie.png" alt="Icône dyslexie" title="dyslexie">
    </button>

    <div class="search-page-header">
        <div class="search-page-container">
            <a href="../index.html" class="search-logo">Le Scribouill'art</a>
            <div class="search-box-container">
                <input type="text" id="search-input" class="search-box" placeholder="Rechercher...">
            </div>
        </div>
    </div>

    <main class="search-main">
        <div class="search-page-container">
            <div id="search-stats" class="search-stats"></div>
            <div id="search-results" class="search-results-list">
                <!-- Les résultats de recherche seront affichés ici -->
            </div>
        </div>
    </main>

    <script src="../theme/noel/neige.js" defer></script>
    <script src="../js/dyslexic-mode.js"></script>
    <script src="../java-script/recherche.js"></script>
</body>
</html>
