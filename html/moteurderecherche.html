<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recherche - Le Scribouill'art</title>
    <link rel="stylesheet" href="../styles.css">
    <style>
        body {
            background-color: #e8e6e3;
        }
    </style>
</head>
<body>
    <a href="#main-content" class="skip-link">Aller au contenu principal</a>
    <div class="home-drawer-backdrop" hidden></div>
    <aside class="home-side-panel" id="home-side-panel" aria-hidden="true" hidden>
        <div class="home-side-panel-inner">
            <h2 class="home-side-panel-title">Le feuillet</h2>
            <a href="feuillet.html" class="home-side-panel-text">À l'aube des temps</a>
        </div>
    </aside>
    <div class="search-page-header">
        <div class="search-page-container-center">
            <a href="../index.html" class="search-logo-colorful">
                <span class="color-blue">L</span><span class="color-red">e</span> 
                <span class="color-blue">S</span><span class="color-yellow">c</span><span class="color-blue">r</span><span class="color-green">i</span><span class="color-red">b</span><span class="color-blue">o</span><span class="color-yellow">o</span><span class="color-blue">g</span><span class="color-green">l</span><span class="color-red">e</span><span class="color-yellow"> !</span>
            </a>
            <p class="search-tagline-header">Recherchez sur Le Scribouill'art !</p>
            <div class="search-box-container-large">
                <input type="text" id="search-input" class="search-box-large" placeholder="" autocomplete="off">
            </div>
            <div class="search-buttons-container">
                <button id="search-btn" class="search-button-primary">Rechercher</button>
                <a href="../index.html" class="search-button-secondary">J'ai de la chance</a>
            </div>
        </div>
    </div>

    <main class="search-main" id="main-content">
        <div class="search-page-container">
            <div id="search-stats" class="search-stats"></div>
            <div id="search-results" class="search-results-list">
                <!-- Les résultats de recherche seront affichés ici -->
            </div>
        </div>
    </main>

    <!-- <script src="../theme/noel/neige.js" defer></script> -->
    <script src="../java-script/interface/home-drawer.js"></script>
    <script src="../java-script/interface/dyslexic-mode.js"></script>
    <script src="../java-script/interface/tagline-fireflies.js"></script>
    <script src="../java-script/recherche/recherche.js"></script>
</body>
</html>
