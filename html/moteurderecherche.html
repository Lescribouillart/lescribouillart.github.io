<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">

    <title>Recherche - Le Scribouill'art</title>

<body>
    <header class="header">
        <div class="container">
            <button class="accessibility-btn" aria-label="Mode dyslexie">

            <div class="search-container">

            <nav class="nav">
