<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Le Scribouill'art</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <button class="accessibility-btn" aria-label="Mode dyslexie">
                <img src="../images/inclusif/dislexie.png" alt="Icône dyslexie" title="dyslexie">
            </button>
            <a href="../index.html" style="text-decoration: none; color: inherit;">
                <div class="logo-row">
                    <h1 class="logo">Le Scribouill'art</h1>
                    <img src="../images/logo/scribouillart.png" alt="Logo Scribouill'art" class="logo-img">
                </div>
            </a>
            <p class="tagline">Le journal fictif aux articles bien réels</p>
            <nav class="nav">
                <a href="../index.html" class="nav-link">Accueil</a>
                <a href="listage-articles.html" class="nav-link">Publications</a>
                <a href="feuillet.html" class="nav-link">Feuillet</a>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="presentation">
                <div class="presentation-bg2">
                    <h1>Contact</h1>
                    <p>N'hésitez pas à nous contacter pour toute question ou suggestion.</p>
                    <form id="contact-form">
                        <!-- Clé d'accès Web3Forms -->
                        <input type="hidden" name="access_key" value="a5cdcbc6-a140-41a6-9dd3-a92c23f42b0a">
                        
                        <!-- Configuration de l'email de destination -->
                        <input type="hidden" name="subject" value="Nouveau message depuis Le Scribouill'art">
                        <input type="hidden" name="from_name" value="Le Scribouill'art">
                        
                        <!-- Protection anti-spam (honeypot) - Ne pas supprimer -->
                        <input type="checkbox" name="botcheck" style="display: none;">
                        
                        <div class="form-group">
                            <label for="nom">Nom :</label>
                            <input type="text" id="nom" name="name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email :</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label for="message">Message :</label>
                            <textarea id="message" name="message" rows="5" required></textarea>
                        </div>
                        <button type="submit">Envoyer</button>
                    </form>
                    
                    <div class="article-footer">
                        <a href="../index.html" class="back-link">← Retour à l'accueil</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <nav class="footer-nav">
                <a href="a-propos.html" class="footer-link">À propos</a>
                <a href="contact.html" class="footer-link">Contact</a>
                <a href="auteur.html" class="footer-link">Auteur</a>
                <a href="mentions-legales.html" class="footer-link">Mention légales</a>
            </nav>
            <p class="footer-copyright">© 2025 Le Scribouill'art - Tous droits réservés</p>
        </div>
    </footer>

    <script src="../js/dyslexic-mode.js"></script>
    <script src="../java-script/formulaire-mail.js"></script>
</body>
</html>
