<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Éditeur d'articles - Le Scribouill'art</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body class="editor-page">
    <header class="header">
        <div class="container">
            <a href="../index.html" style="text-decoration: none; color: inherit;">
                <h1 class="logo">Le Scribouill'art</h1>
            </a>
            <p class="tagline">Éditeur d'articles</p>
        </div>
    </header>

    <main class="main">
        <!-- Barre supérieure -->
        <div class="top-bar">
            <div class="top-bar-left">
                <span class="editor-mode-title">✍️ Éditeur d'articles</span>
            </div>
            <div class="top-bar-actions">
                <button class="dark-mode-toggle" id="darkModeToggle" title="Basculer en mode nuit">
                    🌙
                </button>
                <button class="wp-button" id="loadBtn">📂 Charger</button>
                <button class="wp-button danger" id="clearBtn">🗑️ Effacer</button>
                <button class="wp-button primary" id="saveBtn">📤 Publier</button>
            </div>
        </div>

        <div class="editor-container" id="editorContainer">
            <!-- Barre latérale des articles -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <h3 class="sidebar-title">Mes articles</h3>
                    <button class="new-article-btn" id="newArticleBtn" title="Nouvel article">+</button>
                </div>
                <div class="articles-list" id="articlesList">
                    <div class="no-articles">Aucun article sauvegardé</div>
                </div>
            </aside>

            <!-- Zone principale de l'éditeur -->
            <div class="editor-main">
                <div class="editor-wrapper">
                    <!-- Informations de l'article -->
                    <div class="article-info">
                        <input 
                            type="text" 
                            id="articleSubject" 
                            class="article-subject" 
                            placeholder="Ajouter un titre"
                            maxlength="100"
                        >
                    </div>

                    <!-- Barre d'outils enrichie -->
                    <div class="toolbar">
                        <!-- Sélecteur de paragraphe -->
                        <div class="toolbar-dropdown">
                            <select class="toolbar-select" id="formatSelect">
                                <option value="p">Paragraphe</option>
                                <option value="h1">Titre 1</option>
                                <option value="h2">Titre 2</option>
                                <option value="h3">Titre 3</option>
                                <option value="h4">Titre 4</option>
                                <option value="h5">Titre 5</option>
                                <option value="h6">Titre 6</option>
                                <option value="blockquote">Citation</option>
                                <option value="pre">Code</option>
                            </select>
                        </div>

                        <div class="toolbar-separator"></div>

                        <!-- Formatage de texte -->
                        <button class="toolbar-btn" data-command="bold" title="Gras (Ctrl+B)">
                            <strong>B</strong>
                        </button>
                        <button class="toolbar-btn" data-command="italic" title="Italique (Ctrl+I)">
                            <em>I</em>
                        </button>
                        <button class="toolbar-btn" data-command="underline" title="Souligné (Ctrl+U)">
                            <u>U</u>
                        </button>
                        <button class="toolbar-btn" data-command="strikeThrough" title="Barré">
                            <s>S</s>
                        </button>

                        <div class="toolbar-separator"></div>

                        <!-- Couleurs -->
                        <div class="color-picker-wrapper">
                            <button class="toolbar-btn" title="Couleur du texte" onclick="document.getElementById('textColor').click()">
                                A
                            </button>
                            <input type="color" id="textColor" class="color-input">
                        </div>
                        <div class="color-picker-wrapper">
                            <button class="toolbar-btn" title="Couleur de fond" onclick="document.getElementById('bgColor').click()">
                                🎨
                            </button>
                            <input type="color" id="bgColor" class="color-input">
                        </div>

                        <div class="toolbar-separator"></div>

                        <!-- Listes -->
                        <button class="toolbar-btn" data-command="insertUnorderedList" title="Liste à puces">
                            •
                        </button>
                        <button class="toolbar-btn" data-command="insertOrderedList" title="Liste numérotée">
                            1.
                        </button>
                        <button class="toolbar-btn" data-command="outdent" title="Réduire le retrait">
                            ◁
                        </button>
                        <button class="toolbar-btn" data-command="indent" title="Augmenter le retrait">
                            ▷
                        </button>

                        <div class="toolbar-separator"></div>

                        <!-- Alignement -->
                        <button class="toolbar-btn" data-command="justifyLeft" title="Aligner à gauche">
                            ⬅
                        </button>
                        <button class="toolbar-btn" data-command="justifyCenter" title="Centrer">
                            ↔
                        </button>
                        <button class="toolbar-btn" data-command="justifyRight" title="Aligner à droite">
                            ➡
                        </button>
                        <button class="toolbar-btn" data-command="justifyFull" title="Justifier">
                            ⬌
                        </button>

                        <div class="toolbar-separator"></div>

                        <!-- Liens et médias -->
                        <button class="toolbar-btn" id="linkBtn" title="Insérer un lien">
                            🔗
                        </button>
                        <button class="toolbar-btn" id="unlinkBtn" data-command="unlink" title="Supprimer le lien">
                            🔓
                        </button>
                        <button class="toolbar-btn" id="imageBtn" title="Insérer une image">
                            🖼️
                        </button>

                        <div class="toolbar-separator"></div>

                        <!-- Actions -->
                        <button class="toolbar-btn" data-command="undo" title="Annuler (Ctrl+Z)">
                            ↶
                        </button>
                        <button class="toolbar-btn" data-command="redo" title="Rétablir (Ctrl+Y)">
                            ↷
                        </button>
                        <button class="toolbar-btn" data-command="removeFormat" title="Supprimer le formatage">
                            ✖
                        </button>
                        <button class="toolbar-btn" id="sourceBtn" title="Voir le code HTML">
                            &lt;/&gt;
                        </button>
                    </div>

                    <!-- Zone d'édition -->
                    <div class="editor-area" id="editor" contenteditable="true">
                        <p>Commencez à écrire ou tapez / pour choisir un bloc</p>
                    </div>

                    <!-- Zone de sortie -->
                    <div class="status-message" id="statusMessage"></div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <nav class="footer-nav">
                <a href="../index.html" class="footer-link">Accueil</a>
                <a href="listage-articles.html" class="footer-link">Articles</a>
            </nav>
        </div>
    </footer>

    <script src="../java-script/tirages.js"></script>
</body>
</html>
